<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Týmy – odpovědi na čas</title>
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
<section id="joinView" class="card">
      <div class="grid2">
        <div>
          <label for="teamName">Jméno týmu</label>
          <input id="teamName" type="text" maxlength="40" placeholder="např. Modří blesci">
        </div>
        <div>
          <label for="roomCode">Pětimístný kód místnosti</label>
          <input id="roomCode" type="text" inputmode="numeric" maxlength="5" placeholder="12345">
        </div>
      </div>
      <div class="actions">
        <button id="joinBtn">Vstoupit / vytvořit místnost</button>
        <button id="randomBtn" class="secondary">Vygenerovat kód</button>
      </div>
      <p class="hint">První telefon v místnosti se stane hostem. Další týmy čekají na schválení hostem.</p>
      <div class="statusRow">
        <span class="pill" id="localRole">Nepřipojeno</span>
        <span class="pill" id="roomInfo">Místnost: —</span>
      </div>
    </section>

    <section id="hostLobbyView" class="card hidden cleanView">
      <div class="hostCodeBar"></div>
      <div id="pendingTeams" class="list"></div>
      <div id="acceptedTeams" class="list compactList"></div>
      <div class="actions cleanActions">
        <button id="startGameBtn">Začít hru</button>
        <button id="endGameBtn" class="secondary">Ukončit hru</button>
      </div>
      <div class="timeStartWrap">
        <input id="timedSeconds" type="number" min="1" step="1" placeholder="čas kola v sekundách">
        <button id="timedStartBtn" class="secondary">Spustit na čas</button>
      </div>
    </section>

    <section id="hostRoundView" class="card hidden cleanView centerView">
      <div class="hostCodeBar"></div>
      <div class="countdownBox">
        <div class="countdownLabel">Zbývající čas</div>
        <div id="countdown" class="countdownValue"></div>
        <div class="actions cleanActions singleAction">
          <button id="stopRoundBtn" class="danger bigBtn">Skončit kolo</button>
        </div>
      </div>
    </section>

    <section id="hostResultsView" class="card hidden cleanView">
      <div class="hostCodeBar"></div>
      <div id="answersList" class="answers tableAnswers"></div>
      <div class="actions cleanActions">
        <button id="nextRoundBtn">Další kolo</button>
        <button id="endGameBtnResults" class="secondary">Ukončit hru</button>
      </div>
      <div class="timeStartWrap">
        <input id="nextTimedSeconds" type="number" min="1" step="1" placeholder="čas kola v sekundách">
        <button id="nextTimedStartBtn" class="secondary">Další kolo na čas</button>
      </div>
    </section>

    <section id="hostFinalView" class="card hidden cleanView">
      <div id="finalRanking" class="answers"></div>
      <div class="actions cleanActions">
        <button id="newRoomBtn">Zpět na úvod</button>
      </div>
    </section>

    <section id="playerWaitingView" class="card hidden cleanView centerTextOnly">
      <div id="waitingText" class="bigText">Počkejte na zahájení soutěže.</div>
    </section>

    <section id="playerReadyView" class="card hidden cleanView centerTextOnly">
      <div class="bigText">Počkejte na zahájení soutěže.</div>
    </section>

    <section id="playerRoundView" class="card hidden cleanView">
      <label for="answerInput">Zde napište svou odpověď</label>
      <textarea id="answerInput" rows="4" maxlength="300" placeholder="Zde napište svou odpověď"></textarea>
      <div class="actions cleanActions singleAction">
        <button id="submitAnswerBtn">Odeslat</button>
      </div>
      <p class="hint centerHint" id="submitState"></p>
    </section>

    <section id="playerHoldView" class="card hidden cleanView centerTextOnly">
      <div class="bigText">Počkejte na další otázku.</div>
    </section>

    <section id="playerRejectedView" class="card hidden cleanView centerTextOnly">
      <div class="bigText">Tým nebyl přijat.</div>
    </section>

    <section id="loadingView" class="card hidden cleanView centerTextOnly">
      <div>Načítání…</div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
